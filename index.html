<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caffeine Tracker Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #6F4E37;
            --primary-light: #A67B5B;
            --bg: #FDFCFB;
            --text: #2D241E;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .hero {
            width: 100%;
            padding: 40px 20px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            position: relative;
        }

        #mg-display { font-size: 3.5rem; font-weight: 800; display: block; }

        .settings-icon {
            position: absolute; top: 40px; right: 20px;
            font-size: 1.5rem; color: white; opacity: 0.8;
        }

        /* Graphique */
        .chart-container {
            width: 90%; max-width: 400px;
            background: white; border-radius: 20px;
            margin-top: -15px; padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        /* Badge Sommeil */
        .sleep-status {
            padding: 8px 15px; border-radius: 20px;
            margin-top: 10px; display: inline-block;
            font-weight: 600; font-size: 0.8rem;
        }
        .status-green { background-color: var(--success); color: white; }
        .status-orange { background-color: var(--warning); color: white; }
        .status-red { background-color: var(--danger); color: white; }

        .btn-add-main {
            background: var(--text); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 700;
            margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: white; width: 100%; border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 30px 20px env(safe-area-inset-bottom); box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.3s ease-out;
        }
        .modal.active { transform: translateY(0); }
        
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .opt-btn { background: #F5F5F5; padding: 15px; border-radius: 15px; font-weight: 700; text-align: center; }
        .opt-btn.active { border: 2px solid var(--primary); background: #FDF7F2; }
        
        .history-container { width: 100%; max-width: 400px; padding: 0 20px 100px; box-sizing: border-box; }
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="settings-icon" onclick="openSettings()">⚙️</div>
        <small>CAFÉINE ACTUELLE</small>
        <span id="mg-display">0.00</span>
        <div id="sleep-badge" class="sleep-status">Calcul...</div>
    </div>

    <div class="chart-container">
        <canvas id="caffeineChart"></canvas>
    </div>

    <button class="btn-add-main" onclick="openModal()">+ Ajouter un café</button>

    <div class="history-container" id="history-list"></div>

    <div class="modal-overlay" id="overlay" onclick="closeModal()">
        <div class="modal" id="modal" onclick="event.stopPropagation()">
            <span style="font-weight:800; display:block; margin-bottom:20px;">Nouvelle dose</span>
            <div class="option-grid">
                <div class="opt-btn" id="opt-7" onclick="selectType(70, 'Force 7', 'opt-7')">☕ Force 7</div>
                <div class="opt-btn" id="opt-decaf" onclick="selectType(3, 'Décaf', 'opt-decaf')">🔴 Décaf</div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="custom-mg" placeholder="mg" style="width:40%; padding:15px; border-radius:12px; border:1px solid #eee;">
                <input type="time" id="custom-time" style="width:60%; padding:15px; border-radius:12px; border:1px solid #eee;">
            </div>
            <button onclick="saveEntry()" style="width:100%; background:var(--primary); color:white; padding:18px; border-radius:15px; border:none; font-weight:700; margin-top:20px;">Enregistrer</button>
        </div>
    </div>

    <div class="modal-overlay" id="settings-overlay" onclick="closeSettings()">
        <div class="modal" id="settings-modal" onclick="event.stopPropagation()">
            <span style="font-weight:800; display:block; margin-bottom:20px;">Réglages Métabolisme</span>
            <label style="font-size:0.9rem;">Demi-vie (heures) : <b id="hl-val">5</b>h</label>
            <input type="range" id="hl-range" min="2" max="10" step="0.5" value="5" style="width:100%; margin:20px 0;" oninput="updateHl(this.value)">
            <p style="font-size:0.7rem; color:#888;">Note: 5h est la moyenne. 3h pour les fumeurs. 7h+ pour une sensibilité élevée.</p>
            <button onclick="closeSettings()" style="width:100%; background:var(--text); color:white; padding:15px; border-radius:15px; border:none; margin-top:10px;">Fermer</button>
            <button onclick="clearAll()" style="width:100%; background:none; color:red; border:none; margin-top:20px; font-size:0.7rem;">Réinitialiser les données</button>
        </div>
    </div>

<script>
    let entries = [];
    let selectedMg = 0;
    let selectedLabel = "";
    let halfLife = 5;
    let chart;

    // --- INITIALISATION ---
    function init() {
        const saved = localStorage.getItem('caf_pro_v3');
        if(saved) entries = JSON.parse(saved);
        const savedHl = localStorage.getItem('caf_hl');
        if(savedHl) {
            halfLife = parseFloat(savedHl);
            document.getElementById('hl-range').value = halfLife;
            document.getElementById('hl-val').innerText = halfLife;
        }
        initChart();
        update();
        setInterval(update, 30000); // Mise à jour auto toutes les 30s
    }

    // --- MODALS ---
    function openModal() {
        document.getElementById('overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
        document.getElementById('custom-time').value = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }
    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
    }
    function openSettings() {
        document.getElementById('settings-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('settings-modal').classList.add('active'), 10);
    }
    function closeSettings() {
        document.getElementById('settings-modal').classList.remove('active');
        setTimeout(() => document.getElementById('settings-overlay').style.display = 'none', 300);
    }

    function updateHl(val) {
        halfLife = parseFloat(val);
        document.getElementById('hl-val').innerText = val;
        localStorage.setItem('caf_hl', val);
        update();
    }

    function selectType(mg, label, id) {
        selectedMg = mg; selectedLabel = label;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveEntry() {
        const customMg = parseFloat(document.getElementById('custom-mg').value);
        let finalMg = customMg || selectedMg;
        let finalLabel = customMg ? "Perso" : selectedLabel;
        const timeVal = document.getElementById('custom-time').value;
        if(!finalMg || !timeVal) return;
        const [h, m] = timeVal.split(':');
        const d = new Date(); d.setHours(h, m, 0);
        entries.push({mg: finalMg, label: finalLabel, d: d});
        localStorage.setItem('caf_pro_v3', JSON.stringify(entries));
        closeModal(); update();
    }

    function calculateAtTime(targetDate) {
        let total = 0;
        entries.forEach(i => {
            let diff = (targetDate - new Date(i.d)) / 3600000;
            if(diff < 0) diff = 0;
            total += i.mg * Math.pow(0.5, diff / halfLife);
        });
        return total;
    }

    function initChart() {
        const ctx = document.getElementById('caffeineChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{
                label: 'mg',
                data: [],
                borderColor: '#6F4E37',
                backgroundColor: 'rgba(111, 78, 55, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }] },
            options: {
                responsive: true,
                scales: { y: { min: 0, suggestedMax: 150 }, x: { grid: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function update() {
        const now = new Date();
        const currentMg = calculateAtTime(now);
        document.getElementById('mg-display').innerText = currentMg.toFixed(2);

        // Badge Sommeil
        const tonight = new Date(); tonight.setHours(23, 0, 0);
        const predicted = calculateAtTime(tonight);
        const badge = document.getElementById('sleep-badge');
        badge.className = 'sleep-status ' + (predicted < 50 ? 'status-green' : predicted < 100 ? 'status-orange' : 'status-red');
        badge.innerText = `À 23h : ${predicted.toFixed(0)}mg`;

        // Mise à jour Graphique (Prochaines 12h)
        const labels = []; const data = [];
        for(let i=0; i<=12; i+=2) {
            const future = new Date(now.getTime() + i*3600000);
            labels.push(future.getHours() + 'h');
            data.push(calculateAtTime(future).toFixed(1));
        }
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.update();

        // Historique
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        entries.sort((a,b) => new Date(b.d) - new Date(a.d)).slice(0, 5).forEach(i => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>${i.label}</span><span>${new Date(i.d).getHours()}h${new Date(i.d).getMinutes().toString().padStart(2,'0')}</span>`;
            list.appendChild(div);
        });
    }

    function clearAll() { if(confirm("Réinitialiser ?")) { entries = []; localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
</html>
