<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stress Miner</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; filter: blur(0.5px); }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,20,0,0.8); padding: 15px; border: 1px solid #00ff41; border-radius: 5px; font-size: 12px; }
        .btn { background: #00ff41; color: black; border: none; padding: 5px 10px; margin-top: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:disabled { background: #004411; color: #008822; }
        #gflops-display { color: #ff3300; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="ui">
        <div>DATA: <span id="data-count">0</span> TB</div>
        <hr>
        <div>GÉNÉRATION: <span id="gen">1</span></div>
        <div>POPULATION: <span id="pop-text">500</span></div>
        <div id="gflops-display"><span id="gflops">0.00</span> GFLOPS</div>
        <hr>
        <button class="btn" id="up-pop">UP POPULATION (Coût: 10)</button>
        <button class="btn" id="up-speed">UP MUTATION (Coût: 50)</button>
    </div>
    <canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

// Variables de jeu
let data = 0;
let popSize = 500;
let mutationRate = 0.02;
let lifespan = 200;
let generation = 1;
let count = 0;
let population = [];
let target = { x: 0, y: 50 };
let lastTime = performance.now();
let frames = 0;

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    target.x = canvas.width / 2;
    for(let i=0; i<popSize; i++) population.push(new SmartDot());
}

class SmartDot {
    constructor(dna) {
        this.pos = { x: canvas.width / 2, y: canvas.height - 50 };
        this.vel = { x: 0, y: 0 };
        this.dna = dna || Array.from({length: lifespan}, () => ({ x: Math.random()*2-1, y: Math.random()*2-1 }));
        this.fitness = 0;
        this.dead = false;
        this.reached = false;
    }

    update() {
        if (this.dead || this.reached) return;
        let move = this.dna[count];
        this.vel.x += move.x;
        this.vel.y += move.y;
        this.pos.x += this.vel.x;
        this.pos.y += this.vel.y;

        if (this.pos.x < 0 || this.pos.x > canvas.width || this.pos.y < 0 || this.pos.y > canvas.height) this.dead = true;
        let d = Math.hypot(this.pos.x - target.x, this.pos.y - target.y);
        if (d < 15) { 
            this.reached = true; 
            data += 1; // On gagne de la data !
        }
    }

    draw() {
        ctx.fillStyle = this.reached ? '#ffffff' : '#00ff41';
        ctx.globalAlpha = this.reached ? 1.0 : 0.2;
        ctx.fillRect(this.pos.x, this.pos.y, 3, 3);
    }
}

function calculateGFLOPS(currentFPS) {
    // Estimation grossière : chaque update de bot = ~15 opérations flottantes (hypot, additions, multiplications)
    // + rendu + logique de sélection.
    let opsPerFrame = popSize * 25; 
    let totalOpsPerSec = opsPerFrame * currentFPS;
    return (totalOpsPerSec / 1e9).toFixed(4);
}

function nextGen() {
    population.sort((a, b) => {
        let da = Math.hypot(a.pos.x - target.x, a.pos.y - target.y);
        let db = Math.hypot(b.pos.x - target.x, b.pos.y - target.y);
        return da - db;
    });

    let bestDNA = population[0].dna;
    population = Array.from({length: popSize}, () => {
        let newDna = bestDNA.map(v => Math.random() < mutationRate ? {x:Math.random()*2-1, y:Math.random()*2-1} : v);
        return new SmartDot(newDna);
    });
    
    count = 0;
    generation++;
    document.getElementById('gen').innerText = generation;
}

// Upgrades
document.getElementById('up-pop').onclick = () => {
    if(data >= 10) { data -= 10; popSize += 200; }
};
document.getElementById('up-speed').onclick = () => {
    if(data >= 50) { data -= 50; mutationRate += 0.05; }
};

function loop() {
    ctx.fillStyle = 'black';
    ctx.globalAlpha = 0.3; // Traînée de mouvement
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;

    ctx.fillStyle = 'red';
    ctx.beginPath(); ctx.arc(target.x, target.y, 15, 0, Math.PI*2); ctx.fill();

    population.forEach(dot => { dot.update(); dot.draw(); });

    count++;
    if (count >= lifespan) nextGen();

    frames++;
    let now = performance.now();
    if (now - lastTime >= 1000) {
        document.getElementById('gflops').innerText = calculateGFLOPS(frames);
        document.getElementById('data-count').innerText = data;
        document.getElementById('pop-text').innerText = popSize;
        frames = 0;
        lastTime = now;
    }
    
    // Désactiver boutons si pas assez de data
    document.getElementById('up-pop').disabled = data < 10;
    document.getElementById('up-speed').disabled = data < 50;

    requestAnimationFrame(loop);
}

init();
loop();
</script>
</body>
</html>
