<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caffeine Tracker Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #6F4E37;
            --primary-light: #A67B5B;
            --bg: #FDFCFB;
            --text: #2D241E;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .hero {
            width: 100%;
            padding: 50px 20px 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        #mg-display { font-size: 4.5rem; font-weight: 800; display: block; }

        /* Badge Sommeil */
        .sleep-status {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 15px;
            display: inline-block;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-green { background-color: var(--success) !important; color: white; }
        .status-orange { background-color: var(--warning) !important; color: white; }
        .status-red { background-color: var(--danger) !important; color: white; }

        .fab-container { margin-top: -25px; z-index: 10; }
        .btn-add-main {
            background: var(--text); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Modal & UI Elements */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: white; width: 100%; border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 30px 20px env(safe-area-inset-bottom); box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.3s ease-out;
        }
        .modal.active { transform: translateY(0); }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .opt-btn { background: #F5F5F5; padding: 20px; border-radius: 20px; font-weight: 700; text-align: center; }
        .opt-btn.active { border: 2px solid var(--primary); background: #FDF7F2; }
        
        .history-container { width: 100%; max-width: 400px; margin-top: 30px; padding: 0 20px 100px; box-sizing: border-box; }
        .history-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <div class="hero">
        <small>Taux actuel</small>
        <span id="mg-display">0.00</span>
        
        <div id="sleep-badge" class="sleep-status">
            Analyse du sommeil...
        </div>
    </div>

    <div class="fab-container">
        <button class="btn-add-main" onclick="openModal()">+ Ajouter un café</button>
    </div>

    <div class="history-container" id="history-list"></div>

    <div class="modal-overlay" id="overlay" onclick="closeModal()">
        <div class="modal" id="modal" onclick="event.stopPropagation()">
            <span style="font-weight:800; display:block; margin-bottom:20px;">Nouvelle dose</span>
            <div class="option-grid">
                <div class="opt-btn" id="opt-7" onclick="selectType(70, 'Force 7', 'opt-7')">☕ Force 7</div>
                <div class="opt-btn" id="opt-decaf" onclick="selectType(3, 'Décaf', 'opt-decaf')">🔴 Décaf</div>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="custom-mg" placeholder="mg" style="width:40%; padding:15px; border-radius:12px; border:1px solid #eee;">
                <input type="time" id="custom-time" style="width:60%; padding:15px; border-radius:12px; border:1px solid #eee;">
            </div>
            <button onclick="saveEntry()" style="width:100%; background:var(--primary); color:white; padding:18px; border-radius:15px; border:none; font-weight:700; margin-top:20px;">Enregistrer</button>
        </div>
    </div>

<script>
    let entries = [];
    let selectedMg = 0;
    let selectedLabel = "";
    const HL = 5; // Demi-vie moyenne

    function openModal() {
        document.getElementById('overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('modal').classList.add('active'), 10);
        document.getElementById('custom-time').value = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
    }

    function selectType(mg, label, id) {
        selectedMg = mg; selectedLabel = label;
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveEntry() {
        const customMg = parseFloat(document.getElementById('custom-mg').value);
        let finalMg = customMg || selectedMg;
        let finalLabel = customMg ? "Perso" : selectedLabel;
        const timeVal = document.getElementById('custom-time').value;
        if(!finalMg || !timeVal) return;

        const [h, m] = timeVal.split(':');
        const d = new Date(); d.setHours(h, m, 0);
        entries.push({mg: finalMg, label: finalLabel, d: d});
        localStorage.setItem('caf_pro_v2', JSON.stringify(entries));
        closeModal(); update();
    }

    function calculateAtTime(targetDate) {
        let total = 0;
        entries.forEach(i => {
            let diff = (targetDate - new Date(i.d)) / 3600000;
            if(diff < 0) diff = 0;
            total += i.mg * Math.pow(0.5, diff / HL);
        });
        return total;
    }

    function update() {
        const now = new Date();
        const currentMg = calculateAtTime(now);
        
        // Prédiction à 23h
        const tonight = new Date();
        tonight.setHours(23, 0, 0);
        // Si il est déjà après 23h, on prédit pour demain 23h ou on reste sur aujourd'hui
        const predictedMg = calculateAtTime(tonight);

        document.getElementById('mg-display').innerText = currentMg.toFixed(2);

        // Mise à jour du Badge Sommeil
        const badge = document.getElementById('sleep-badge');
        badge.classList.remove('status-green', 'status-orange', 'status-red');

        if (predictedMg < 50) {
            badge.innerText = `Prédiction 23h : ${predictedMg.toFixed(0)}mg (Sommeil OK ✅)`;
            badge.classList.add('status-green');
        } else if (predictedMg < 100) {
            badge.innerText = `Prédiction 23h : ${predictedMg.toFixed(0)}mg (Risque moyen ⚠️)`;
            badge.classList.add('status-orange');
        } else {
            badge.innerText = `Prédiction 23h : ${predictedMg.toFixed(0)}mg (Sommeil perturbé ❌)`;
            badge.classList.add('status-red');
        }

        // Liste historique
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        entries.sort((a,b) => new Date(b.d) - new Date(a.d)).forEach(i => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span><strong>${i.label}</strong></span><span>${new Date(i.d).getHours()}h${new Date(i.d).getMinutes().toString().padStart(2,'0')}</span>`;
            list.appendChild(div);
        });
    }

    const saved = localStorage.getItem('caf_pro_v2');
    if(saved) entries = JSON.parse(saved);
    update();
    setInterval(update, 10000);
</script>
</body>
</html>
