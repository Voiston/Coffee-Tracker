<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAFFEINE PROTOCOL V9</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@1,900&family=Saira+Condensed:wght@700;900&display=swap');

        :root {
            --bg: #0A0A0A;
            --surface: #121212;
            --accent: #B8860B; /* Bronze métallique */
            --text: #F2F2F2;
            --text-dim: #444444;
            --radius: 2px;
        }

        body {
            font-family: 'Saira Condensed', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            letter-spacing: 0.05em;
        }

        /* --- DASHBOARD HEADER --- */
        .hero {
            width: 100%;
            padding: 70px 20px 50px;
            background: linear-gradient(180deg, #111 0%, #0A0A0A 100%);
            border-bottom: 1px solid #1A1A1A;
            text-align: center;
            position: relative;
        }

        .settings-btn {
            position: absolute; top: 40px; right: 20px;
            color: var(--text-dim); font-size: 0.8rem; cursor: pointer;
            font-weight: 900; border: 1px solid #222; padding: 4px 8px;
        }

        .label-tech {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 900;
        }

        /* --- PULSE EFFECT (VISIBLE & MASCULIN) --- */
        #mg-display {
            font-family: 'Inter', sans-serif; /* Inter Black Italic */
            font-size: 6rem;
            font-weight: 900;
            font-style: italic;
            display: block;
            margin: 5px 0;
            color: var(--text);
            line-height: 0.9;
            position: relative;
        }

        @keyframes pulse-shadow {
            0% { filter: drop-shadow(0 0 5px rgba(184, 134, 11, 0.2)); }
            50% { filter: drop-shadow(0 0 20px rgba(184, 134, 11, 0.6)); }
            100% { filter: drop-shadow(0 0 5px rgba(184, 134, 11, 0.2)); }
        }

        .active-pulse {
            animation: pulse-shadow var(--pulse-speed, 2s) infinite ease-in-out;
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* --- CONTAINER --- */
        .container { width: 92%; max-width: 420px; margin-top: 20px; padding-bottom: 140px; }

        .card {
            background: var(--surface);
            border-left: 3px solid #1A1A1A;
            padding: 20px;
            margin-bottom: 15px;
        }

        .card-header {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: flex; justify-content: space-between;
        }

        /* --- ACTION BUTTON --- */
        .btn-main {
            position: fixed; bottom: 30px;
            width: 88%; max-width: 380px;
            background: var(--text);
            color: #000;
            border: none;
            padding: 20px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 100;
            border-radius: var(--radius);
        }

        /* --- LOGS --- */
        .log-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px dotted #222;
        }
        .log-info strong { font-size: 1rem; color: var(--text); }
        .log-info div { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
        .del-btn { color: #333; font-weight: 900; padding: 10px; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.96); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal {
            background: #000; width: 85%; padding: 30px;
            border: 1px solid #222; border-radius: var(--radius);
        }
        .grid-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-opt {
            background: #111; border: 1px solid #222; color: #fff;
            padding: 15px; font-weight: 900; font-family: 'Saira Condensed';
        }
        .btn-opt.active { background: var(--accent); color: #000; }
        
        input {
            background: #000; border: 1px solid #222; color: #fff;
            padding: 15px; width: 100%; margin-bottom: 10px; box-sizing: border-box;
            font-family: 'Saira Condensed'; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="settings-btn" onclick="openModal('modal-settings')">CONFIG_01</div>
        <span class="label-tech">METABOLIC_INDEX</span>
        <span id="mg-display" class="active-pulse">0.00</span>
        <div class="status-bar" id="sleep-badge">
            <span id="sleep-txt">ANALYZING_SYSTEM</span>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header"><span>ESTIMATED_DECAY</span><span>V9_TECH</span></div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="card">
            <div class="card-header"><span>RECENT_UNITS</span><span id="entry-count">0</span></div>
            <div id="history-list"></div>
        </div>
    </div>

    <button class="btn-main" onclick="openModal('modal-add')">ADD_DATA_POINT +</button>

    <div class="modal-overlay" id="modal-add" onclick="closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="label-tech" style="display:block; margin-bottom:20px;">INPUT_DOSE</span>
            <div class="grid-opts">
                <button class="btn-opt" id="p-7" onclick="setPreset(70, 'FORCE_7', 'p-7')">F7 (70MG)</button>
                <button class="btn-opt" id="p-d" onclick="setPreset(3, 'DECAF', 'p-d')">DCF (3MG)</button>
            </div>
            <input type="number" id="in-mg" placeholder="MG_CUSTOM">
            <input type="time" id="in-t">
            <button class="btn-main" style="position:static; width:100%; margin-top:20px; background:var(--accent);" onclick="saveEntry()">CONFIRM</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-settings" onclick="closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="label-tech" style="display:block; margin-bottom:20px;">HALF_LIFE_ADJUST</span>
            <div style="text-align:center;">
                <span style="font-family:'Inter'; font-size:4rem; font-weight:900; font-style:italic;" id="hl-val">5.0</span>
                <input type="range" id="hl-range" min="2" max="10" step="0.5" style="width:100%; margin:30px 0;" oninput="updateHl(this.value)">
            </div>
            <button class="btn-opt" style="width:100%;" onclick="closeModals()">BACK</button>
            <button onclick="clearAll()" style="color:#222; background:none; border:none; width:100%; margin-top:20px; font-size:0.6rem; font-weight:900;">ERASE_ALL_DATA</button>
        </div>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('caf_v9') || '[]');
    let hl = parseFloat(localStorage.getItem('caf_hl_v9') || '5');
    let preset = { mg: 0, lbl: "" };
    let chart;

    function init() {
        initChart();
        update();
        setInterval(update, 10000);
        document.getElementById('hl-range').value = hl;
        document.getElementById('hl-val').innerText = hl.toFixed(1);
    }

    function calc(time) {
        return entries.reduce((acc, i) => {
            let diff = (time - new Date(i.d)) / 3600000;
            return acc + (diff < 0 ? 0 : i.mg * Math.pow(0.5, diff / hl));
        }, 0);
    }

    function update() {
        const now = new Date();
        const cur = calc(now);
        const display = document.getElementById('mg-display');
        display.innerText = cur.toFixed(2);

        // --- PULSE DYNAMIQUE ---
        let speed = 3 - (Math.min(cur, 150) / 150) * 2.5;
        display.style.setProperty('--pulse-speed', Math.max(speed, 0.5) + 's');
        
        // --- SLEEP STATUS ---
        const ton = new Date(); ton.setHours(23,0,0);
        const pred = calc(ton);
        const txt = document.getElementById('sleep-txt');
        
        if(pred < 50) { txt.style.color = '#CCFF00'; txt.innerText = `SLEEP_OPTIMAL // ${pred.toFixed(0)}MG`; }
        else if(pred < 100) { txt.style.color = '#FFAA00'; txt.innerText = `SLEEP_RISK // ${pred.toFixed(0)}MG`; }
        else { txt.style.color = '#FF003C'; txt.innerText = `SLEEP_CRITICAL // ${pred.toFixed(0)}MG`; }

        updateChart(now);
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        document.getElementById('entry-count').innerText = entries.length;
        [...entries].sort((a,b) => new Date(b.d) - new Date(a.d)).slice(0,4).forEach((i, idx) => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<div class="log-info"><strong>${i.lbl}</strong><div>${i.mg}MG @ ${new Date(i.d).getHours()}H${new Date(i.d).getMinutes().toString().padStart(2,'0')}</div></div><div class="del-btn" onclick="removeEntry(${entries.length - 1 - idx})">DEL</div>`;
            list.appendChild(div);
        });
    }

    function saveEntry() {
        const custom = parseFloat(document.getElementById('in-mg').value);
        const mg = custom || preset.mg;
        const lbl = custom ? "CUSTOM" : preset.lbl;
        const t = document.getElementById('in-t').value;
        if(!mg || !t) return;
        const [h,m] = t.split(':');
        const d = new Date(); d.setHours(h,m,0);
        entries.push({mg, lbl, d});
        saveStorage();
        closeModals();
    }

    function removeEntry(idx) { entries.splice(idx, 1); saveStorage(); }
    function saveStorage() { localStorage.setItem('caf_v9', JSON.stringify(entries)); update(); }
    function openModal(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'modal-add') document.getElementById('in-t').value = new Date().getHours().toString().padStart(2,'0')+":"+new Date().getMinutes().toString().padStart(2,'0');
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function setPreset(mg, lbl, id) {
        preset = { mg, lbl };
        document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function updateHl(v) { hl = parseFloat(v); document.getElementById('hl-val').innerText = hl.toFixed(1); localStorage.setItem('caf_hl_v9', v); update(); }
    function clearAll() { if(confirm("FORMAT ALL?")) { entries = []; saveStorage(); location.reload(); } }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#B8860B', borderWidth: 2, tension: 0.1, fill: false, pointRadius: 0 }] },
            options: { responsive: true, plugins: { legend: false }, scales: { y: { display: false }, x: { ticks: { color: '#333', font: { family: 'Saira Condensed', size: 10 } }, grid: { color: '#111' } } } }
        });
    }

    function updateChart(now) {
        const labels = []; const points = [];
        for(let i=0; i<=12; i+=2) {
            const t = new Date(now.getTime() + i*3600000);
            labels.push(t.getHours() + 'H');
            points.push(calc(t).toFixed(1));
        }
        chart.data.labels = labels;
        chart.data.datasets[0].data = points;
        chart.update('none');
    }

    init();
</script>
</body>
</html>
