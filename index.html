<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caffeine Tracker Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0F0E0E; /* Noir Mat */
            --card-bg: #1A1817; /* Brun très sombre */
            --primary: #D2691E; /* Orange Cuivré / Chocolat */
            --text-main: #E0E0E0;
            --text-dim: #888888;
            --accent: #FF4500;
            --radius: 10px; /* Border radius plus faible */
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- HEADER DYNAMIQUE (JAUGE) --- */
        .hero {
            width: 100%;
            padding: 50px 20px 40px;
            background: #111; /* Fallback */
            position: relative;
            text-align: center;
            overflow: hidden;
            border-bottom: 2px solid var(--primary);
            transition: background 0.5s ease;
        }

        /* L'effet de remplissage */
        .hero-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(0deg, rgba(210, 105, 30, 0.3) 0%, rgba(210, 105, 30, 0) 100%);
            transition: height 0.8s ease;
            z-index: 1;
        }

        .hero-content { position: relative; z-index: 2; }

        .settings-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 1.2rem; cursor: pointer; opacity: 0.6;
        }

        #mg-display {
            font-size: 4.5rem; font-weight: 900;
            display: block; line-height: 1;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(210, 105, 30, 0.4);
        }

        .sleep-status {
            display: inline-block; padding: 6px 14px;
            border-radius: var(--radius);
            font-size: 0.75rem; font-weight: 800;
            margin-top: 15px; text-transform: uppercase;
        }
        .status-green { background: #2E7D32; color: #A5D6A7; }
        .status-orange { background: #E65100; color: #FFCCBC; }
        .status-red { background: #B71C1C; color: #EF9A9A; }

        /* --- CONTENEUR --- */
        .main-container {
            width: 92%; max-width: 400px;
            padding: 20px 0 120px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px;
            border: 1px solid #2A2827;
        }

        .card-title {
            font-size: 0.7rem; font-weight: 800; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block;
        }

        /* --- BOUTON AJOUT --- */
        .fab {
            position: fixed; bottom: 30px;
            background: var(--primary); color: white;
            border: none; padding: 16px 32px;
            border-radius: var(--radius);
            font-weight: 900; font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 10px;
        }

        /* --- HISTORIQUE --- */
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #2A2827;
        }
        .item-label { font-weight: 700; font-size: 0.9rem; }
        .item-time { font-size: 0.75rem; color: var(--text-dim); }
        .btn-delete { color: #555; font-size: 1.2rem; padding: 5px; cursor: pointer; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(8px);
        }
        .modal {
            background: #1A1817; width: 85%; max-width: 320px;
            padding: 25px; border-radius: var(--radius);
            border: 1px solid var(--primary);
        }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .opt-btn {
            background: #2A2827; border: 1px solid #333; color: white;
            padding: 15px; border-radius: var(--radius); font-weight: 800;
        }
        .opt-btn.active { border-color: var(--primary); background: rgba(210, 105, 30, 0.1); }
        
        input {
            background: #000; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box;
        }

        .btn-save { background: var(--primary); color: white; width: 100%; padding: 15px; border-radius: var(--radius); font-weight: 900; }

    </style>
</head>
<body>

    <div class="hero" id="hero">
        <div class="hero-overlay" id="jauge"></div>
        <div class="hero-content">
            <div class="settings-btn" onclick="openSettings()">⚙️</div>
            <small style="letter-spacing: 2px;">CAFFEINE LEVEL</small>
            <span id="mg-display">0.00</span>
            <div id="sleep-badge" class="sleep-status">Calcul...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <span class="card-title">Forecast</span>
            <canvas id="chart"></canvas>
        </div>

        <div class="card">
            <span class="card-title">Recent Logs</span>
            <div id="history-list"></div>
        </div>
    </div>

    <button class="fab" onclick="openAdd()">+ ADD COFFEE</button>

    <div class="modal-overlay" id="add-modal" onclick="closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="card-title" style="margin-bottom:20px;">Register Dose</span>
            <div class="opt-grid">
                <button class="opt-btn" id="p-7" onclick="setPreset(70, 'F7', 'p-7')">F7<br><small>70mg</small></button>
                <button class="opt-btn" id="p-d" onclick="setPreset(3, 'Decaf', 'p-d')">DECAF<br><small>3mg</small></button>
            </div>
            <input type="number" id="c-mg" placeholder="Custom mg">
            <input type="time" id="c-t">
            <button class="btn-save" onclick="save()">SAVE</button>
        </div>
    </div>

    <div class="modal-overlay" id="set-modal" onclick="closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="card-title">Settings</span>
            <div style="text-align:center; margin: 20px 0;">
                <span style="font-size: 2rem; font-weight: 900; color: var(--primary);" id="hl-val">5.0</span>h
                <input type="range" id="hl-range" min="2" max="10" step="0.5" oninput="changeHl(this.value)" style="width:100%; margin-top:15px;">
            </div>
            <button class="btn-save" onclick="closeModals()" style="background:#333;">CLOSE</button>
            <button onclick="clearAll()" style="background:none; border:none; color:red; font-size:0.7rem; width:100%; margin-top:20px; text-decoration:underline;">RESET DATA</button>
        </div>
    </div>

<script>
    let data = JSON.parse(localStorage.getItem('caf_v5') || '[]');
    let hl = parseFloat(localStorage.getItem('caf_hl_v5') || '5');
    let preset = { mg: 0, lbl: "" };
    let chart;

    function init() {
        initChart();
        update();
        setInterval(update, 15000);
        document.getElementById('hl-range').value = hl;
        document.getElementById('hl-val').innerText = hl.toFixed(1);
    }

    // --- LOGIQUE ---
    function update() {
        const now = new Date();
        const cur = calc(now);
        document.getElementById('mg-display').innerText = cur.toFixed(2);

        // Jauge dynamique
        const height = Math.min(cur, 150) / 1.5; // Max jauge à 150mg
        document.getElementById('jauge').style.height = height + "%";

        // Sommeil
        const ton = new Date(); ton.setHours(23,0,0);
        const pred = calc(ton);
        const b = document.getElementById('sleep-badge');
        b.className = 'sleep-status ' + (pred < 50 ? 'status-green' : pred < 100 ? 'status-orange' : 'status-red');
        b.innerText = `At 23h: ${pred.toFixed(0)}mg`;

        // Graph
        updateChart(now);

        // History
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        [...data].sort((a,b) => new Date(b.d) - new Date(a.d)).slice(0,5).forEach((i, idx) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<div><span class="item-label">${i.lbl}</span> <span class="item-time">(${i.mg}mg) à ${new Date(i.d).getHours()}h</span></div><div class="btn-delete" onclick="del(${data.length - 1 - idx})">×</div>`;
            list.appendChild(div);
        });
    }

    function calc(time) {
        return data.reduce((acc, i) => {
            let diff = (time - new Date(i.d)) / 3600000;
            return acc + (diff < 0 ? 0 : i.mg * Math.pow(0.5, diff / hl));
        }, 0);
    }

    function del(index) {
        data.splice(index, 1);
        saveStorage();
    }

    function save() {
        const custom = parseFloat(document.getElementById('c-mg').value);
        const mg = custom || preset.mg;
        const lbl = custom ? "Perso" : preset.lbl;
        const t = document.getElementById('c-t').value;
        if(!mg || !t) return;
        const [h,m] = t.split(':');
        const d = new Date(); d.setHours(h,m,0);
        data.push({mg, lbl, d});
        saveStorage();
        closeModals();
    }

    function saveStorage() {
        localStorage.setItem('caf_v5', JSON.stringify(data));
        update();
    }

    // --- UI ---
    function openAdd() {
        document.getElementById('add-modal').style.display = 'flex';
        document.getElementById('c-t').value = new Date().getHours().toString().padStart(2,'0')+":"+new Date().getMinutes().toString().padStart(2,'0');
        preset = { mg: 0, lbl: "" };
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    }
    function openSettings() { document.getElementById('set-modal').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function setPreset(mg, lbl, id) {
        preset = { mg, lbl };
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('c-mg').value = "";
    }
    function changeHl(v) {
        hl = parseFloat(v);
        document.getElementById('hl-val').innerText = hl.toFixed(1);
        localStorage.setItem('caf_hl_v5', v);
        update();
    }
    function clearAll() { if(confirm("Clear all data?")) { data = []; saveStorage(); location.reload(); } }

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#D2691E', tension: 0.4, fill: true, backgroundColor: 'rgba(210, 105, 30, 0.05)', pointRadius: 0 }] },
            options: { plugins: { legend: false }, scales: { y: { display: false }, x: { ticks: { color: '#555', font: { size: 10 } }, grid: { display: false } } } }
        });
    }

    function updateChart(now) {
        const labels = []; const points = [];
        for(let i=0; i<=12; i+=2) {
            const t = new Date(now.getTime() + i*3600000);
            labels.push(t.getHours() + 'h');
            points.push(calc(t).toFixed(1));
        }
        chart.data.labels = labels;
        chart.data.datasets[0].data = points;
        chart.update('none');
    }

    init();
</script>
</body>
</html>
