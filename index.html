<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAFFEINE X-TRACKER ELITE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #000000;
            --surface: #0A0A0A;
            --accent: #CCFF00;
            --danger: #FF003C;
            --text: #FFFFFF;
            --text-dim: #444444;
            --radius: 8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- DASHBOARD HEADER --- */
        .hero {
            width: 100%;
            padding: 70px 20px 50px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border-bottom: 2px solid #222;
            text-align: center;
            position: relative;
        }

        .settings-btn {
            position: absolute; top: 40px; right: 25px;
            color: var(--text-dim); font-size: 1.2rem;
        }

        .label-tech {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--accent);
            opacity: 0.8;
        }

        /* --- EFFET PULSE RÉACTIF --- */
        #mg-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 5.5rem;
            font-weight: 900;
            font-style: italic;
            display: block;
            margin: 15px 0;
            color: var(--text);
            transition: text-shadow 0.3s ease;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px rgba(204, 255, 0, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 40px rgba(204, 255, 0, 0.6); transform: scale(1.02); }
            100% { text-shadow: 0 0 10px rgba(204, 255, 0, 0.2); transform: scale(1); }
        }

        .active-pulse {
            animation: pulse-glow var(--pulse-speed, 2s) infinite ease-in-out;
        }

        .sleep-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #000;
            border: 1px solid #222;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
        }

        .status-dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        /* --- LAYOUT --- */
        .container { width: 92%; max-width: 420px; margin-top: 25px; padding-bottom: 140px; }

        .card {
            background: var(--surface);
            border: 1px solid #151515;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 2px; height: 10px; background: var(--accent);
        }

        .card-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: flex; justify-content: space-between;
        }

        /* --- ACTION BUTTON --- */
        .btn-main {
            position: fixed; bottom: 30px;
            width: 85%; max-width: 380px;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 22px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 2px;
            z-index: 100;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }

        /* --- LOGS --- */
        .log-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #111;
        }
        .log-info strong { font-family: 'Orbitron'; font-size: 0.9rem; color: var(--accent); }
        .log-info div { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }
        .delete-btn { color: var(--danger); font-family: 'Orbitron'; font-size: 0.8rem; padding: 10px; }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.98); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal {
            background: #050505; width: 85%; padding: 40px 25px;
            border: 1px solid #222; position: relative;
        }
        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .btn-opt {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 20px; font-family: 'Orbitron'; font-size: 0.8rem;
        }
        .btn-opt.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        input {
            background: #000; border: 1px solid #222; color: #fff;
            padding: 18px; width: 100%; margin-bottom: 15px; box-sizing: border-box;
            font-family: 'Orbitron'; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="settings-btn" onclick="openModal('modal-settings')">MOD_CFG</div>
        <span class="label-tech">METABOLIC_SENSORS // LIVE</span>
        <span id="mg-display" class="active-pulse">0.00</span>
        <div class="sleep-indicator" id="sleep-badge">
            <div class="status-dot"></div>
            <span>ANALYZING...</span>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header"><span>DECAY_PROJECTION</span><span>v7.0_ELITE</span></div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="card">
            <div class="card-header"><span>INTAKE_HISTORY</span><span id="entry-count">0_UNITS</span></div>
            <div id="history-list"></div>
        </div>
    </div>

    <button class="btn-main" onclick="openModal('modal-add')">INITIATE_INTAKE</button>

    <div class="modal-overlay" id="modal-add" onclick="closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="label-tech" style="display:block; margin-bottom:30px;">SELECT_DOSE_TYPE</span>
            <div class="grid-options">
                <button class="btn-opt" id="p-7" onclick="setPreset(70, 'FORCE_7', 'p-7')">F7_70MG</button>
                <button class="btn-opt" id="p-d" onclick="setPreset(3, 'DECAF', 'p-d')">DCF_3MG</button>
            </div>
            <input type="number" id="in-mg" placeholder="CUSTOM_MG">
            <input type="time" id="in-t">
            <button class="btn-main" style="position:static; width:100%; margin-top:30px;" onclick="saveEntry()">CONFIRM_DATA</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-settings" onclick="closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <span class="label-tech" style="display:block; margin-bottom:30px;">BIOMETRIC_ADJUST</span>
            <div style="text-align:center;">
                <span style="font-family:'Orbitron'; font-size:4rem; color:var(--accent); font-style:italic;" id="hl-val">5.0</span>
                <span class="label-tech">HL_PERIOD</span>
                <input type="range" id="hl-range" min="2" max="10" step="0.5" style="width:100%; margin:40px 0;" oninput="updateHl(this.value)">
            </div>
            <button class="btn-opt" style="width:100%;" onclick="closeModals()">RETURN</button>
            <button onclick="clearAll()" style="color:var(--danger); background:none; border:none; width:100%; margin-top:30px; font-size:0.55rem; font-family:'Orbitron'; opacity:0.5;">WIPE_LOCAL_STORAGE</button>
        </div>
    </div>

<script>
    let entries = JSON.parse(localStorage.getItem('caf_v7') || '[]');
    let hl = parseFloat(localStorage.getItem('caf_hl_v7') || '5');
    let preset = { mg: 0, lbl: "" };
    let chart;

    function init() {
        initChart();
        update();
        setInterval(update, 10000);
        document.getElementById('hl-range').value = hl;
        document.getElementById('hl-val').innerText = hl.toFixed(1);
    }

    function calc(time) {
        return entries.reduce((acc, i) => {
            let diff = (time - new Date(i.d)) / 3600000;
            return acc + (diff < 0 ? 0 : i.mg * Math.pow(0.5, diff / hl));
        }, 0);
    }

    function update() {
        const now = new Date();
        const cur = calc(now);
        const display = document.getElementById('mg-display');
        display.innerText = cur.toFixed(2);

        // --- UPDATE PULSE SPEED ---
        // Plus le taux est haut, plus ça bat vite (de 3s à 0.6s)
        let speed = 3 - (Math.min(cur, 200) / 100) * 1.2;
        if (speed < 0.6) speed = 0.6;
        display.style.setProperty('--pulse-speed', speed + 's');
        
        // --- SLEEP STATUS ---
        const ton = new Date(); ton.setHours(23,0,0);
        const pred = calc(ton);
        const b = document.getElementById('sleep-badge');
        const dot = b.querySelector('.status-dot');
        const txt = b.querySelector('span');
        
        if(pred < 50) { dot.style.color = '#CCFF00'; b.style.borderColor = '#222'; txt.innerText = `READY_23H: ${pred.toFixed(0)}MG`; }
        else if(pred < 100) { dot.style.color = '#FFAA00'; b.style.borderColor = '#FFAA0033'; txt.innerText = `WARN_23H: ${pred.toFixed(0)}MG`; }
        else { dot.style.color = '#FF003C'; b.style.borderColor = '#FF003C33'; txt.innerText = `CRIT_23H: ${pred.toFixed(0)}MG`; }

        updateChart(now);
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        document.getElementById('entry-count').innerText = `${entries.length}_UNITS`;
        [...entries].sort((a,b) => new Date(b.d) - new Date(a.d)).slice(0,4).forEach((i, idx) => {
            const div = document.createElement('div');
            div.className = 'log-item';
            div.innerHTML = `<div class="log-info"><strong>${i.lbl}</strong><div>${i.mg}MG @ ${new Date(i.d).getHours()}H${new Date(i.d).getMinutes().toString().padStart(2,'0')}</div></div><div class="delete-btn" onclick="removeEntry(${entries.length - 1 - idx})">DEL</div>`;
            list.appendChild(div);
        });
    }

    function saveEntry() {
        const custom = parseFloat(document.getElementById('in-mg').value);
        const mg = custom || preset.mg;
        const lbl = custom ? "MANUAL" : preset.lbl;
        const t = document.getElementById('in-t').value;
        if(!mg || !t) return;
        const [h,m] = t.split(':');
        const d = new Date(); d.setHours(h,m,0);
        entries.push({mg, lbl, d});
        saveStorage();
        closeModals();
    }

    function removeEntry(idx) { entries.splice(idx, 1); saveStorage(); }
    function saveStorage() { localStorage.setItem('caf_v7', JSON.stringify(entries)); update(); }
    function openModal(id) { 
        document.getElementById(id).style.display = 'flex'; 
        if(id === 'modal-add') document.getElementById('in-t').value = new Date().getHours().toString().padStart(2,'0')+":"+new Date().getMinutes().toString().padStart(2,'0');
    }
    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function setPreset(mg, lbl, id) {
        preset = { mg, lbl };
        document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function updateHl(v) { hl = parseFloat(v); document.getElementById('hl-val').innerText = hl.toFixed(1); localStorage.setItem('caf_hl_v7', v); update(); }
    function clearAll() { if(confirm("FORMAT ALL DATA?")) { entries = []; saveStorage(); location.reload(); } }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#CCFF00', borderWidth: 2, tension: 0.2, fill: true, backgroundColor: 'rgba(204, 255, 0, 0.02)', pointRadius: 0 }] },
            options: { responsive: true, plugins: { legend: false }, scales: { y: { display: false }, x: { ticks: { color: '#333', font: { family: 'Orbitron', size: 8 } }, grid: { color: '#111' } } } }
        });
    }

    function updateChart(now) {
        const labels = []; const points = [];
        for(let i=0; i<=12; i+=2) {
            const t = new Date(now.getTime() + i*3600000);
            labels.push(t.getHours() + 'H');
            points.push(calc(t).toFixed(1));
        }
        chart.data.labels = labels;
        chart.data.datasets[0].data = points;
        chart.update('none');
    }

    init();
</script>
</body>
</html>
